name: Community CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Check default features
        run: cargo check -p nopaldb

      - name: Check nopaldb-mcp
        run: cargo check -p nopaldb-mcp

      - name: Clippy (semantic)
        run: cargo clippy -p nopaldb --features semantic -- -D warnings

      - name: Test core tier
        run: cargo test -p nopaldb --features core --lib

      # Sin python: el link de tests PyO3 se valida via maturin, no aqui
      - name: Test semantic tier (rust-only)
        run: cargo test -p nopaldb --features core,reasoner,owl-import,shacl --lib

      - name: Test ndbstudio
        run: cargo test -p ndbstudio

      - name: Test isolation feature (full-isolation)
        run: cargo test -p nopaldb --features full-isolation --test p1_isolation_levels_test --test deadlock_tests --test p1_isolation_concurrent_test

      - name: Test clock persistence and concurrency regressions
        run: cargo test -p nopaldb --test clock_persistence_test --test concurrent_writers_test --test adjacency_update_regression_test

      - name: Test crash recovery (SIGKILL harness)
        run: cargo test -p nopaldb --test crash_commit_test

      - name: Test idempotent upsert (M1-4)
        run: cargo test -p nopaldb --features core --test upsert_test

      - name: Test hybrid search (M1-5)
        run: cargo test -p nopaldb --features core --test hybrid_test

  python-stubs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build extension + check stubs (guard against .pyi drift)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --quiet maturin mypy
          maturin develop -m nopaldb/Cargo.toml
          python nopaldb/python/scripts/check_stubs.py
          mypy --strict nopaldb/python/scripts/typecheck_sample.py
