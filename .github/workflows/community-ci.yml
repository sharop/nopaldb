name: Community CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Check default features
        run: cargo check -p nopaldb

      - name: Check nopaldb-mcp
        run: cargo check -p nopaldb-mcp

      - name: Clippy (semantic)
        run: cargo clippy -p nopaldb --features semantic -- -D warnings

      - name: Test core tier
        run: cargo test -p nopaldb --features core --lib

      # Sin python: el link de tests PyO3 se valida via maturin, no aqui
      - name: Test semantic tier (rust-only)
        run: cargo test -p nopaldb --features core,reasoner,owl-import,shacl --lib

      - name: Test ndbstudio
        run: cargo test -p ndbstudio

      - name: Test isolation feature (full-isolation)
        run: cargo test -p nopaldb --features full-isolation --test p1_isolation_levels_test --test deadlock_tests

      - name: Test clock persistence and concurrency regressions
        run: cargo test -p nopaldb --test clock_persistence_test --test concurrent_writers_test

  # Tests de estrés que documentan races RMW conocidos en escrituras directas
  # (se corrigen con el applier single-writer). Informativo: no bloquea el PR.
  stress-known-races:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Concurrent-writer stress (known races, informational)
        run: cargo test -p nopaldb --test concurrent_writers_test -- --ignored
